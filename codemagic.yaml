workflows:
  build-ios-app:
    name: Build AL-ZKER iOS App
    max_build_duration: 30
    instance_type: mac_mini_m2
    scripts:
      - name: Generate Xcode Project using XcodeGen
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Build unsigned iOS App for Sideloadly
        script: |
          xcodebuild build \
            -project AL-ZKER.xcodeproj \
            -scheme AL-ZKER \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa
      - "*.xcarchive"
